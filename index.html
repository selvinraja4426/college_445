<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>College Login Web</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    color:#333;
}

/* HEADER */

header{
    background:#0d6efd;
    padding:15px 30px;
    color:white;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:20px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.nav-links a:hover{
    color:yellow;
}

/* HERO */

.hero{
    background:linear-gradient(to right,#0d6efd,#3c8dff);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
}

/* FORM */

.form-section{
    padding:40px 20px;
}

.form-container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.form-title{
    text-align:center;
    margin-bottom:25px;
    color:#0d6efd;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    font-weight:bold;
}

.input-group input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

.input-group input:focus{
    border-color:#0d6efd;
}

.full-width{
    grid-column:1/3;
}

.submit-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#0d6efd;
    color:white;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#084298;
}

/* TABLE */

.table-section{
    padding:40px 20px;
}

.table-container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    overflow-x:auto;
    box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#0d6efd;
    color:white;
}

tr:hover{
    background:#f1f1f1;
}

.view-btn{
    padding:8px 14px;
    background:#198754;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.view-btn:hover{
    background:#146c43;
}

/* FOOTER */

footer{
    margin-top:40px;
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

/* RESPONSIVE */

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .nav-links{
        flex-direction:column;
        text-align:center;
    }

    .hero h1{
        font-size:30px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:1;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<nav class="navbar">

<div class="logo">College Portal</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">Students</a></li>
<li><a href="#">Courses</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
<li><a href="#">Edit</a></li>
</ul>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<h1>College Login Website</h1>

<p>Responsive College Portal using HTML CSS and JavaScript</p>

</section>

<!-- FORM -->

<section class="form-section">

<div class="form-container">

<h2 class="form-title">Student Registration</h2>

<form>

<div class="form-grid">

<div class="input-group">
<label>First Name</label>
<input type="text" id="firstname" placeholder="Enter first name">
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text" id="lastname" placeholder="Enter last name">
</div>

<div class="input-group">
<label>Roll Number</label>
<input type="text" id="rollnumber" placeholder="Enter roll number">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter email">
</div>

<div class="input-group full-width">
<button type="button" class="submit-btn" onclick="registerFunc()">
Submit
</button>
</div>

</div>

</form>

</div>

</section>

<!-- TABLE -->

<section class="table-section">

<div class="table-container">

<table>

</table>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>© 2026 College Website | All Rights Reserved</p>

</footer>


</script>
<script src="./js/main.js"></script>

</body>
